<head>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     DESIGN TOKENS
     ========================================================= */
  :root{
    --font-display:'Fredoka', sans-serif;
    --font-ar:'Tajawal', sans-serif;
    --font-en:'Nunito', sans-serif;

    /* Light theme */
    --bg:#FBF5EC;
    --surface:#FFFFFF;
    --surface-2:#F4E9D8;
    --surface-3:#FBE3D6;
    --text:#2E2A25;
    --text-soft:#83766A;
    --primary:#E2603F;
    --primary-dark:#C44A2C;
    --primary-soft:#FBE0D4;
    --secondary:#2E7D7E;
    --secondary-soft:#DCEEEE;
    --gold:#F2B341;
    --gold-soft:#FCEFD2;
    --border:#EBDFCB;
    --success:#4C9A6A;
    --success-soft:#DFF1E6;
    --error:#D6453A;
    --error-soft:#FAE0DD;
    --shadow:0 8px 24px -8px rgba(76,52,30,.18);
    --shadow-sm:0 2px 8px -2px rgba(76,52,30,.15);
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:10px;
  }
  html.dark{
    --bg:#16242A;
    --surface:#1E343B;
    --surface-2:#243E44;
    --surface-3:#2D454B;
    --text:#F4ECE0;
    --text-soft:#9FB3B5;
    --primary:#F2784F;
    --primary-dark:#F7A07D;
    --primary-soft:#3A2A24;
    --secondary:#5FC1C2;
    --secondary-soft:#1F3A3C;
    --gold:#F5C463;
    --gold-soft:#3A331E;
    --border:#2E4850;
    --success:#6FBF8B;
    --success-soft:#1F3A2E;
    --error:#E2685A;
    --error-soft:#3A2624;
    --shadow:0 8px 28px -10px rgba(0,0,0,.55);
    --shadow-sm:0 2px 10px -2px rgba(0,0,0,.45);
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  html{ font-size:16px; scroll-behavior:smooth; }

  body{
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background .35s ease, color .35s ease;
    font-size:1rem;
    line-height:1.6;
  }
  body.lang-ar{ font-family:var(--font-ar), var(--font-en), sans-serif; }
  body.lang-en{ font-family:var(--font-en), var(--font-ar), sans-serif; }

  /* Spanish / Latin text always LTR + display font */
  .es{
    font-family:var(--font-display), sans-serif;
    direction:ltr;
    unicode-bidi:isolate;
  }

  h1,h2,h3,h4{ margin:0; font-weight:700; }
  p{ margin:0; }
  button{ font-family:inherit; }

  img,svg{ display:block; }

  /* =========================================================
     LAYOUT
     ========================================================= */
  #app-shell{
    max-width:980px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
    padding-bottom:90px;
  }

  /* ---------- Header ---------- */
  header.topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
    padding:14px 16px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    backdrop-filter:blur(6px);
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    min-width:0;
  }
  .brand-logo{
    font-size:1.9rem;
    display:inline-block;
    animation:float 3.2s ease-in-out infinite;
  }
  .brand-text{ display:flex; flex-direction:column; min-width:0; }
  .brand-title{
    font-family:var(--font-display);
    font-size:1.15rem; font-weight:700; letter-spacing:.5px;
    color:var(--primary);
    direction:ltr;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .brand-sub{
    font-size:.78rem; color:var(--text-soft);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .back-btn{
    display:flex; align-items:center; gap:6px;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:999px;
    padding:9px 16px;
    font-size:.92rem; font-weight:700;
    cursor:pointer;
    transition:transform .15s ease, background .2s ease;
    flex-shrink:0;
  }
  .back-btn:hover{ background:var(--surface-3); }
  .back-btn:active{ transform:scale(.95); }
  .back-btn .arrow{ transition:transform .2s ease; }
  body.lang-en .back-btn .arrow{ transform:scaleX(-1); }

  .header-controls{ display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .icon-btn{
    width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--surface-2);
    color:var(--text);
    font-size:1.15rem;
    cursor:pointer;
    transition:transform .25s ease, background .2s ease;
  }
  .icon-btn:hover{ background:var(--surface-3); }
  .icon-btn:active{ transform:scale(.9) rotate(-8deg); }
  .lang-btn{
    font-family:var(--font-display);
    font-weight:700; font-size:.85rem;
    width:auto; padding:0 14px; border-radius:999px;
  }

  /* ---------- Main ---------- */
  main#app{
    flex:1;
    padding:18px 16px 24px;
    animation:viewIn .35s ease;
  }
  @keyframes viewIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Bottom nav ---------- */
  nav.bottombar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:980px;
    display:flex; justify-content:space-around;
    background:var(--surface);
    border-top:1px solid var(--border);
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    z-index:50;
    box-shadow:0 -6px 18px -10px rgba(0,0,0,.18);
  }
  .nav-btn{
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--text-soft);
    font-size:.72rem; font-weight:700;
    padding:6px 10px; border-radius:14px;
    transition:color .2s ease, background .2s ease, transform .15s ease;
    flex:1; max-width:140px;
  }
  .nav-btn .nav-icon{ font-size:1.35rem; transition:transform .25s ease; }
  .nav-btn.active{ color:var(--primary); background:var(--primary-soft); }
  .nav-btn.active .nav-icon{ transform:translateY(-2px) scale(1.12); }
  .nav-btn:active{ transform:scale(.92); }

  /* =========================================================
     HOME / DASHBOARD
     ========================================================= */
  .hero{
    background:linear-gradient(135deg, var(--primary) 0%, var(--gold) 130%);
    border-radius:var(--radius-lg);
    padding:22px 20px;
    color:#fff;
    position:relative;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .hero::after{
    content:"✈️";
    position:absolute; font-size:5.5rem; opacity:.18;
    inset-inline-end:-10px; bottom:-18px;
    transform:rotate(15deg);
    animation:float 5s ease-in-out infinite;
  }
  .hero-title{ font-size:1.35rem; margin-bottom:6px; }
  .hero-sub{ font-size:.92rem; opacity:.95; max-width:80%; }
  .hero-progress{
    margin-top:16px; background:rgba(255,255,255,.28);
    border-radius:999px; height:10px; overflow:hidden;
  }
  .hero-progress-fill{
    height:100%; background:#fff; border-radius:999px;
    transition:width .6s ease;
  }
  .hero-progress-label{
    margin-top:8px; font-size:.8rem; font-weight:700; opacity:.95;
  }

  .section-title{
    display:flex; align-items:center; gap:10px;
    font-size:1.05rem; margin:22px 4px 12px;
    color:var(--text);
  }
  .section-title .dot{
    width:10px; height:10px; border-radius:50%; background:var(--secondary);
    flex-shrink:0;
  }
  .section-desc{
    font-size:.85rem; color:var(--text-soft); margin:-6px 4px 12px;
  }

  /* ---------- Level switcher ---------- */
  .level-switcher{
    display:flex; gap:10px; margin-bottom:18px;
  }
  .level-btn{
    flex:1; padding:14px 10px; border-radius:var(--radius-md);
    border:2px solid var(--border); background:var(--surface);
    cursor:pointer; transition:all .2s ease;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    text-align:center;
  }
  .level-btn .lb-title{ font-size:.98rem; font-weight:800; }
  .level-btn .lb-sub{ font-size:.72rem; color:var(--text-soft); font-weight:600; }
  .level-btn.active{ border-color:var(--primary); background:var(--primary-soft); }
  .level-btn.active .lb-sub{ color:var(--primary-dark); }
  .level-btn:active{ transform:scale(.98); }

  /* ---------- Dialogue (chat bubbles) ---------- */
  .dialogue-list{
    display:flex; flex-direction:column; gap:12px;
  }
  .dialogue-line{
    max-width:88%; padding:12px 14px; border-radius:var(--radius-md);
    border:1px solid var(--border); display:flex; flex-direction:column; gap:5px;
    animation:cardIn .4s ease both; position:relative;
  }
  .dialogue-line.speaker-a{
    background:var(--surface); align-self:flex-start;
    border-bottom-left-radius:4px;
  }
  .dialogue-line.speaker-b{
    background:var(--secondary-soft); border-color:var(--secondary);
    align-self:flex-end; border-bottom-right-radius:4px;
  }
  .dialogue-speaker{
    font-size:.7rem; font-weight:800; letter-spacing:.5px;
    text-transform:uppercase; color:var(--secondary);
  }
  .dialogue-line.speaker-b .dialogue-speaker{ color:var(--primary-dark); }
  .dialogue-line .es{ font-size:1.05rem; font-weight:600; }
  .dialogue-line .dl-pron{ font-size:.8rem; color:var(--text-soft); }
  .dialogue-line .dl-meaning{ font-size:.85rem; color:var(--text-soft); }
  .dialogue-line .speak-btn-sm{ align-self:flex-start; margin-top:2px; }
  body.lang-en .dialogue-line.speaker-a, body.lang-ar .dialogue-line.speaker-a{ align-self:flex-start; }
  body.lang-en .dialogue-line.speaker-b, body.lang-ar .dialogue-line.speaker-b{ align-self:flex-end; }

  .card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(150px,1fr));
    gap:12px;
  }
  .lesson-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:14px 12px;
    cursor:pointer;
    display:flex; flex-direction:column; gap:8px;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
    text-align:start;
    animation:cardIn .4s ease both;
  }
  .lesson-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-sm); border-color:var(--primary); }
  .lesson-card:active{ transform:translateY(0) scale(.98); }
  .lesson-card .lc-icon{
    font-size:1.9rem; display:inline-block;
    transition:transform .35s ease;
  }
  .lesson-card:hover .lc-icon{ transform:scale(1.18) rotate(-8deg); }
  .lesson-card .lc-title{ font-size:.95rem; font-weight:700; line-height:1.35; }
  .lesson-card .lc-meta{ font-size:.74rem; color:var(--text-soft); }
  .lesson-card .lc-progress{
    height:6px; border-radius:999px; background:var(--surface-2); overflow:hidden; margin-top:2px;
  }
  .lesson-card .lc-progress-fill{
    height:100%; border-radius:999px; background:var(--secondary); transition:width .5s ease;
  }
  .lesson-card .lc-stamp{
    position:absolute; inset-inline-end:10px; top:10px;
    font-size:1.3rem;
    animation:stampIn .5s cubic-bezier(.2,1.6,.4,1) both;
  }
  @keyframes stampIn{
    from{ opacity:0; transform:scale(2.2) rotate(-25deg); }
    to{ opacity:1; transform:scale(1) rotate(-12deg); }
  }
  @keyframes cardIn{
    from{ opacity:0; transform:translateY(14px) scale(.97); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* =========================================================
     DETAIL VIEW (lesson)
     ========================================================= */
  .lesson-header{
    display:flex; align-items:center; gap:14px;
    margin-bottom:6px;
  }
  .lesson-header .lh-icon{
    font-size:2.6rem;
    width:64px; height:64px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface-2); border-radius:18px;
    animation:wiggle 4s ease-in-out infinite;
  }
  .lesson-header .lh-text{ min-width:0; }
  .lesson-header h2{ font-size:1.25rem; }
  .lesson-header .lh-sub{ font-size:.85rem; color:var(--text-soft); margin-top:2px; }
  @keyframes wiggle{
    0%,100%{ transform:rotate(0deg); }
    8%{ transform:rotate(-8deg); }
    16%{ transform:rotate(7deg); }
    24%{ transform:rotate(0deg); }
  }

  .tabbar{
    display:flex; gap:8px; margin:18px 0 16px;
    overflow-x:auto; padding-bottom:2px;
  }
  .tab-btn{
    border:1px solid var(--border); background:var(--surface);
    color:var(--text-soft);
    padding:9px 18px; border-radius:999px;
    font-weight:700; font-size:.88rem; cursor:pointer;
    white-space:nowrap;
    transition:all .2s ease;
    flex-shrink:0;
  }
  .tab-btn.active{
    background:var(--primary); color:#fff; border-color:var(--primary);
    box-shadow:var(--shadow-sm);
  }

  /* ---------- Flashcards ---------- */
  .flash-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(155px,1fr));
    gap:14px;
  }
  .flashcard{
    perspective:1200px;
    height:148px;
    cursor:pointer;
    animation:cardIn .4s ease both;
  }
  .flashcard-inner{
    position:relative; width:100%; height:100%;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
  }
  .flashcard.flipped .flashcard-inner{ transform:rotateY(180deg); }
  .flash-face{
    position:absolute; inset:0;
    border-radius:var(--radius-md);
    border:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; padding:10px;
    backface-visibility:hidden;
    text-align:center;
  }
  .flash-front{
    background:var(--surface);
  }
  .flash-back{
    background:var(--secondary-soft);
    transform:rotateY(180deg);
    border-color:var(--secondary);
  }
  .flash-front .es{ font-size:1.28rem; font-weight:600; color:var(--primary-dark); }
  .flash-front .ff-pron{ font-size:.84rem; color:var(--text-soft); }
  .flash-back .fb-meaning{ font-size:1rem; font-weight:700; }
  .flash-back .fb-meaning-2{ font-size:.82rem; color:var(--text-soft); }
  .flash-hint{ font-size:.68rem; color:var(--text-soft); opacity:.8; }

  .speak-btn{
    border:none; background:var(--primary); color:#fff;
    width:38px; height:38px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:1.05rem; cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:transform .15s ease, background .2s ease;
    flex-shrink:0;
  }
  .speak-btn:active{ transform:scale(.88); }
  .speak-btn.speaking{ animation:pulseSpeak .7s ease-in-out infinite; }
  @keyframes pulseSpeak{
    0%,100%{ box-shadow:0 0 0 0 rgba(226,96,63,.55); }
    50%{ box-shadow:0 0 0 9px rgba(226,96,63,0); }
  }
  .speak-btn-sm{ width:32px; height:32px; font-size:.92rem; }

  /* ---------- Sentence list ---------- */
  .sentence-list{ display:flex; flex-direction:column; gap:12px; }
  .sentence-card{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:14px;
    display:flex; align-items:center; gap:12px;
    animation:cardIn .4s ease both;
  }
  .sentence-main{ flex:1; min-width:0; }
  .sentence-card .es{ font-size:1.08rem; font-weight:600; margin-bottom:4px; display:block; }
  .sentence-card .sc-pron{ font-size:.82rem; color:var(--secondary); margin-bottom:2px; }
  .sentence-card .sc-meaning{ font-size:.88rem; color:var(--text-soft); }

  /* ---------- Explanation / Grammar ---------- */
  .grammar-box{
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-md); padding:16px; margin-bottom:16px;
    line-height:1.85; font-size:.95rem;
  }
  .grammar-box h3{ font-size:1rem; color:var(--secondary); margin-bottom:8px; }
  .grammar-table{
    width:100%; border-collapse:collapse; margin:10px 0; font-size:.9rem;
  }
  .grammar-table th, .grammar-table td{
    border:1px solid var(--border); padding:7px 10px; text-align:center;
  }
  .grammar-table th{ background:var(--surface-2); }
  .grammar-table td.es{ font-weight:600; color:var(--primary-dark); }

  /* ---------- Quiz ---------- */
  .quiz-progress{
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .quiz-progress-bar{
    flex:1; height:8px; border-radius:999px; background:var(--surface-2); overflow:hidden;
  }
  .quiz-progress-fill{
    height:100%; background:var(--secondary); border-radius:999px; transition:width .4s ease;
  }
  .quiz-progress-text{ font-size:.8rem; font-weight:700; color:var(--text-soft); white-space:nowrap; }

  .quiz-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:22px 18px; text-align:center; box-shadow:var(--shadow-sm);
    animation:cardIn .35s ease both;
  }
  .quiz-question-label{ font-size:.85rem; color:var(--text-soft); margin-bottom:10px; }
  .quiz-prompt{ font-size:1.4rem; font-weight:700; margin-bottom:6px; }
  .quiz-prompt.es{ color:var(--primary-dark); }
  .quiz-sub{ font-size:.95rem; color:var(--text-soft); margin-bottom:16px; }
  .quiz-options{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .quiz-option{
    border:1.5px solid var(--border); background:var(--surface-2);
    border-radius:var(--radius-sm); padding:13px 16px;
    font-size:.98rem; font-weight:600; cursor:pointer;
    text-align:start;
    transition:all .15s ease;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .quiz-option:hover{ border-color:var(--secondary); }
  .quiz-option.correct{
    background:var(--success-soft); border-color:var(--success); color:var(--success);
    animation:correctPulse .4s ease;
  }
  .quiz-option.wrong{
    background:var(--error-soft); border-color:var(--error); color:var(--error);
    animation:shake .35s ease;
  }
  .quiz-option.disabled{ pointer-events:none; opacity:.75; }
  @keyframes correctPulse{
    0%{ transform:scale(1); } 50%{ transform:scale(1.03); } 100%{ transform:scale(1); }
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius:999px; padding:13px 28px;
    font-size:.98rem; font-weight:700; cursor:pointer;
    background:var(--primary); color:#fff;
    transition:transform .15s ease, background .2s ease, opacity .2s ease;
    box-shadow:var(--shadow-sm);
  }
  .btn:active{ transform:scale(.96); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn.secondary{ background:var(--surface-2); color:var(--text); box-shadow:none; border:1px solid var(--border); }
  .btn-row{ display:flex; justify-content:center; gap:10px; margin-top:18px; flex-wrap:wrap; }

  /* ---------- Quiz result ---------- */
  .result-emoji{ font-size:3.6rem; animation:popIn .5s cubic-bezier(.2,1.7,.4,1); }
  @keyframes popIn{
    from{ opacity:0; transform:scale(.3) rotate(-15deg); }
    to{ opacity:1; transform:scale(1) rotate(0); }
  }
  .result-score{ font-size:1.6rem; font-weight:700; margin:10px 0 4px; }
  .result-msg{ color:var(--text-soft); font-size:.92rem; }

  /* =========================================================
     PASSPORT
     ========================================================= */
  .passport-cover{
    background:linear-gradient(135deg, var(--secondary) 0%, #1c4f50 100%);
    border-radius:var(--radius-lg); padding:24px 20px; color:#fff;
    text-align:center; margin-bottom:20px; box-shadow:var(--shadow);
    position:relative; overflow:hidden;
  }
  .passport-cover::after{
    content:"🛂"; position:absolute; font-size:5rem; opacity:.15;
    inset-inline-start:-6px; top:-10px; transform:rotate(-18deg);
  }
  .passport-cover .pc-big{ font-size:2.4rem; font-weight:700; }
  .passport-cover .pc-sub{ font-size:.9rem; opacity:.9; margin-top:4px; }

  .stamp-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(82px,1fr));
    gap:10px;
  }
  .stamp{
    aspect-ratio:1; border-radius:50%;
    border:2.5px dashed var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; background:var(--surface);

/* -------------------------------------------------------------------------
   3. STORAGE (persists across sessions via window.storage)
   ------------------------------------------------------------------------- */
const STORE_KEYS = { settings: 'camino_settings', progress: 'camino_progress' };

async function loadPersisted(){
  try{
    if(window.storage){
      try{
        const s = await window.storage.get(STORE_KEYS.settings);
        if(s && s.value){
          const parsed = JSON.parse(s.value);
          if(parsed.lang) state.lang = parsed.lang;
          if(parsed.theme) state.theme = parsed.theme;
          if(parsed.level === 1 || parsed.level === 2) state.level = parsed.level;
          if(typeof parsed.speechRate === 'number') state.speechRate = parsed.speechRate;
        }
      }catch(e){ /* key may not exist yet */ }
      try{
        const p = await window.storage.get(STORE_KEYS.progress);
        if(p && p.value){
          state.progress = JSON.parse(p.value) || {};
        }
      }catch(e){ /* key may not exist yet */ }
    }
  }catch(e){ console.warn('storage unavailable', e); }
}

async function saveSettings(){
  try{
    if(window.storage){
      await window.storage.set(STORE_KEYS.settings, JSON.stringify({
        lang: state.lang, theme: state.theme, level: state.level, speechRate: state.speechRate
      }));
    }
  }catch(e){ console.warn('save settings failed', e); }
}

async function saveProgress(){
  try{
    if(window.storage){
      await window.storage.set(STORE_KEYS.progress, JSON.stringify(state.progress));
    }
  }catch(e){ console.warn('save progress failed', e); }
}

function setLessonScore(lessonId, scorePct){
  const prev = state.progress[lessonId] || { best: 0, stamped: false };
  const best = Math.max(prev.best, scorePct);
  const stamped = prev.stamped || scorePct >= 60;
  state.progress[lessonId] = { best, stamped };
  saveProgress();
}

/* -------------------------------------------------------------------------
   4. SPEECH (Web Speech API)
   ------------------------------------------------------------------------- */
let availableVoices = [];
if('speechSynthesis' in window){
  const loadVoices = () => { availableVoices = window.speechSynthesis.getVoices(); state.voicesReady = true; };
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function pickSpanishVoice(){
  if(!availableVoices || !availableVoices.length) return null;
  let v = availableVoices.find(function(v){ return /es[-_]ES/i.test(v.lang); });
  if(!v) v = availableVoices.find(function(v){ return /^es/i.test(v.lang); });
  return v || null;
}

function speak(text, btnEl){
  try{
    if(!('speechSynthesis' in window) || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'es-ES';
    utter.rate = state.speechRate || 0.85;
    const v = pickSpanishVoice();
    if(v) utter.voice = v;
    if(btnEl){
      btnEl.classList.add('speaking');
      utter.onend = function(){ btnEl.classList.remove('speaking'); };
      utter.onerror = function(){ btnEl.classList.remove('speaking'); };
    }
    window.speechSynthesis.speak(utter);
  }catch(e){ console.warn('speech failed', e); }
}

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
function escapeHtml(str){
  if(str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function findLesson(id){
  for(let i=0;i<ALL_LESSONS.length;i++){ if(ALL_LESSONS[i].id===id) return ALL_LESSONS[i]; }
  return null;
}

// Progress is tracked per-lesson, but Level 2 topic quizzes (which use vocab2)
// get a separate progress key so they don't overwrite the Level 1 result.
function progKeyFor(lesson, level){
  if(lesson.type === 'grammar') return lesson.id;
  return level === 2 ? (lesson.id + '_l2') : lesson.id;
}
function currentProgKey(lesson){
  return progKeyFor(lesson, state.level);
}

/* -------------------------------------------------------------------------
   9. QUIZ ENGINE
   ------------------------------------------------------------------------- */
function buildVocabQuiz(items, n){
  n = Math.min(n || 5, items.length);
  const chosen = shuffle(items).slice(0, n);
  return chosen.map(function(item){
    const isEsPrompt = Math.random() < 0.5;
    const others = items.filter(function(i){ return i !== item; });
    const distractors = shuffle(others).slice(0, 3);
    let promptText, correctText, optionTexts;
    if(isEsPrompt){
      promptText = item.s;
      correctText = state.lang === 'ar' ? item.a : item.e;
      optionTexts = distractors.map(function(d){ return state.lang === 'ar' ? d.a : d.e; });
    } else {
      promptText = state.lang === 'ar' ? item.a : item.e;
      correctText = item.s;
      optionTexts = distractors.map(function(d){ return d.s; });
    }
    const opts = [{text:correctText, correct:true}].concat(
      optionTexts.map(function(o){ return {text:o, correct:false}; })
    );
    return {
      promptText: promptText,
      promptIsEs: isEsPrompt,
      optionsAreEs: !isEsPrompt,
      options: shuffle(opts)
    };
  });
}

function buildGrammarQuiz(lesson){
  return shuffle(lesson.quiz).map(function(q){
    const opts = q.options.map(function(o,i){ return {text: L(o), correct: i===q.correct}; });
    return {
      promptText: L(q.q),
      promptIsEs: false,
      optionsAreEs: false,
      options: shuffle(opts)
    };
  });
}

function startQuiz(lessonId){
  const lesson = findLesson(lessonId);
  if(!lesson) return;
  let questions, progKey;
  if(lesson.type === 'grammar'){
    questions = buildGrammarQuiz(lesson);
    progKey = lesson.id;
  } else {
    const vocabSet = (state.level === 2) ? lesson.vocab2 : lesson.vocab;
    questions = buildVocabQuiz(vocabSet, 5);
    progKey = progKeyFor(lesson, state.level);
  }
  state.quiz = { lessonId: lessonId, progKey: progKey, questions: questions, index:0, score:0, answered:false, selected:null, finished:false, finalPct:0 };
  render();
}

function answerQuiz(i){
  const quiz = state.quiz;
  if(!quiz || quiz.answered) return;
  quiz.answered = true;
  quiz.selected = i;
  if(quiz.questions[quiz.index].options[i].correct) quiz.score++;
  render();
}

function nextQuestion(){
  if(!state.quiz) return;
  state.quiz.index++;
  state.quiz.answered = false;
  state.quiz.selected = null;
  render();
}

function finishQuiz(){
  const quiz = state.quiz;
  if(!quiz) return;
  const pct = Math.round(quiz.score / quiz.questions.length * 100);
  quiz.finished = true;
  quiz.finalPct = pct;
  setLessonScore(quiz.progKey, pct);
  render();
}

function retryQuiz(){
  if(!state.quiz) return;
  startQuiz(state.quiz.lessonId);
}

function backToLessonFromQuiz(){
  state.quiz = null;
  render();
}

  saveSettings();
  render();
}
function setTheme(theme){
  state.theme = theme;
  applyTheme();
  saveSettings();
  render();
}
function setSpeechRate(v){
  state.speechRate = parseFloat(v);
  saveSettings();
}
function resetProgress(){
  if(window.confirm(t('settingsResetConfirm'))){
    state.progress = {};
    saveProgress();
    render();
  }
}
function applyLang(){
  document.documentElement.lang = state.lang;
  document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  document.body.className = 'lang-' + state.lang;
  const btn = document.getElementById('lang-toggle');
  if(btn) btn.textContent = state.lang === 'ar' ? 'EN' : 'AR';
}
function applyTheme(){
  document.documentElement.classList.toggle('dark', state.theme === 'night');
  const btn = document.getElementById('theme-toggle');
  if(btn) btn.textContent = state.theme === 'night' ? '☀️' : '🌙';
}

  if(lesson.type === 'grammar') return [
    {key:'lesson', label:t('tabLesson')},
    {key:'quiz', label:t('tabQuiz')}
  ];
  if(state.level === 2) return [
    {key:'words2', label:t('tabWords2')},
    {key:'sentences2', label:t('tabSentences2')},
    {key:'dialogue', label:t('tabDialogue')},
    {key:'quiz', label:t('tabQuiz')}

  return [

    {key:'sentences', label:t('tabSentences')},

    }).join('') + '</tr>';

function renderQuizQuestion(){
  const quiz = state.quiz;
  const q = quiz.questions[quiz.index];
  const total = quiz.questions.length;
  const pct = Math.round((quiz.index) / total * 100);
  const promptLabel = q.promptIsEs ? t('promptMeaning') : t('promptWord');

  let optionsHtml = q.options.map(function(opt, i){
    let cls = 'quiz-option';
    let icon = '';
    if(quiz.answered){
      if(opt.correct){ cls += ' correct'; icon = '✅'; }
      else if(i === quiz.selected){ cls += ' wrong'; icon = '❌'; }
      else cls += ' disabled';
    }
    const onclick = quiz.answered ? '' : ' onclick="answerQuiz(' + i + ')"';
    const textSpan = q.optionsAreEs ? '<span class="es">' + escapeHtml(opt.text) + '</span>' : '<span>' + escapeHtml(opt.text) + '</span>';
    return '<button class="' + cls + '"' + onclick + '>' + textSpan + '<span>' + icon + '</span></button>';
  }).join('');

  let speakBtnHtml = '';
  if(q.promptIsEs){
    speakBtnHtml = '<button class="speak-btn" style="margin:0 auto 10px;" data-speak="' + escapeHtml(q.promptText) + '" onclick="speakFromBtn(event,this)">🔊</button>';
  }
  const promptClass = q.promptIsEs ? 'quiz-prompt es' : 'quiz-prompt';

  let footer = '';
  if(quiz.answered){
    const isLast = quiz.index === total - 1;
    footer = '<div class="btn-row"><button class="btn" onclick="' + (isLast ? 'finishQuiz()' : 'nextQuestion()') + '">' + escapeHtml(isLast ? t('finishBtn') : t('nextBtn')) + '</button></div>';
  }

  return (
    '<div class="quiz-progress">' +
      '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="quiz-progress-text">' + escapeHtml(t('questionLabel')) + ' ' + (quiz.index+1) + ' ' + escapeHtml(t('ofLabel')) + ' ' + total + '</div>' +
    '</div>' +
    '<div class="quiz-card">' +
      '<div class="quiz-question-label">' + escapeHtml(promptLabel) + '</div>' +
      speakBtnHtml +
      '<div class="' + promptClass + '">' + escapeHtml(q.promptText) + '</div>' +
      '<div class="quiz-options">' + optionsHtml + '</div>' +
      footer +
    '</div>'
  );
}

function renderQuizResult(){
  const quiz = state.quiz;
  const pct = quiz.finalPct;

  return (

      '<div class="result-score">' + escapeHtml(t('resultScoreLabel')) + ': ' + quiz.score + '/' + quiz.questions.length + ' (' + pct + '%)</div>' +

function renderQuizEntry(lesson){
  if(state.quiz && state.quiz.lessonId === lesson.id){
    return state.quiz.finished ? renderQuizResult() : renderQuizQuestion();
  }
  const prog = state.progress[currentProgKey(lesson)];
  const scoreLine = prog ? ('<div class="lh-sub" style="margin-bottom:14px;">' + escapeHtml(t('bestScore')) + ': ' + prog.best + '%' + (prog.stamped ? ' 🎖️' : '') + '</div>') : '';
  return (
    '<div class="quiz-card">' +
      '<div style="font-size:2.6rem;">📝</div>' +
      scoreLine +
      '<button class="btn" onclick="startQuiz(\'' + lesson.id + '\')">' + escapeHtml(prog ? t('retakeQuiz') : t('startQuiz')) + '</button>' +
    '</div>'
  );
}

function lessonCardHtml(lesson, index){
  const isRef = lesson.type === 'reference';
  let metaHtml = '', progressHtml = '', stampHtml2 = '';
  if(isRef){
    metaHtml = '<div class="lc-meta">' + escapeHtml(t('referenceSection')) + '</div>';
  } else {
    const prog = state.progress[currentProgKey(lesson)];
    const best = prog ? prog.best : 0;
    const statusLabel = (prog && prog.stamped) ? t('mastered') : (best > 0 ? t('inProgress') : t('notStarted'));
    metaHtml = '<div class="lc-meta">' + escapeHtml(statusLabel) + '</div>';
    progressHtml = '<div class="lc-progress"><div class="lc-progress-fill" style="width:' + best + '%"></div></div>';
    if(prog && prog.stamped) stampHtml2 = '<span class="lc-stamp">🎖️</span>';
  }
  return (
    '<div class="lesson-card" tabindex="0" role="button" style="animation-delay:' + (index*25) + 'ms" onclick="openLesson(\'' + lesson.id + '\')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();openLesson(\'' + lesson.id + '\')}">' +
      stampHtml2 +
      '<span class="lc-icon">' + lesson.icon + '</span>' +
      '<div class="lc-title">' + escapeHtml(L(lesson.name)) + '</div>' +
      metaHtml +
      progressHtml +
    '</div>'
  );
}

function stampCellHtml(lesson, progKey, level){
  const earned = state.progress[progKey] && state.progress[progKey].stamped;
  return (
    '<div>' +
      '<div class="stamp ' + (earned ? 'earned' : '') + '" onclick="openLessonAtLevel(\'' + lesson.id + '\', ' + level + ')">' + (earned ? lesson.icon : '?') + '</div>' +
      '<div class="stamp-label">' + escapeHtml(L(lesson.name)) + '</div>' +
    '</div>'
  );
}

function renderHome(){
  const levelStampable = state.level === 2 ? ALL_STAMPABLE_L2 : ALL_STAMPABLE_L1;
  const stampedCount = levelStampable.filter(function(l){
    const k = progKeyFor(l, state.level);
    return state.progress[k] && state.progress[k].stamped;
  }).length;
  const total = levelStampable.length;
  const pct = Math.round(stampedCount / total * 100);

  let html = '';

  html += '<div class="level-switcher">';
  html += '<button class="level-btn ' + (state.level === 1 ? 'active' : '') + '" onclick="setLevel(1)"><span class="lb-title">🟢 ' + escapeHtml(t('level1Title')) + '</span><span class="lb-sub">' + escapeHtml(t('level1Sub')) + '</span></button>';
  html += '<button class="level-btn ' + (state.level === 2 ? 'active' : '') + '" onclick="setLevel(2)"><span class="lb-title">🔵 ' + escapeHtml(t('level2Title')) + '</span><span class="lb-sub">' + escapeHtml(t('level2Sub')) + '</span></button>';
  html += '</div>';

  html += '<div class="hero">';
  html += '<div class="hero-title">' + escapeHtml(state.level === 2 ? t('heroTitleL2') : t('heroTitle')) + '</div>';
  html += '<div class="hero-sub">' + escapeHtml(state.level === 2 ? t('heroSubL2') : t('heroSub')) + '</div>';
  html += '<div class="hero-progress"><div class="hero-progress-fill" style="width:' + pct + '%"></div></div>';
  html += '<div class="hero-progress-label">' + stampedCount + ' / ' + total + ' ' + escapeHtml(t('progressLabel')) + ' · ' + pct + '%</div>';
  html += '</div>';

  if(state.level === 1){
    html += '<div class="section-title"><span class="dot"></span>' + escapeHtml(t('foundationsTitle')) + '</div>';
    html += '<div class="section-desc">' + escapeHtml(t('foundationsDesc')) + '</div>';
    html += '<div class="card-grid">';
    let idx = 0;
    REFERENCE_LESSONS.forEach(function(l){ html += lessonCardHtml(l, idx++); });
    GRAMMAR.forEach(function(l){ html += lessonCardHtml(l, idx++); });
    html += '</div>';
  } else {
    html += '<div class="section-title"><span class="dot"></span>' + escapeHtml(t('grammar2Title')) + '</div>';
    html += '<div class="section-desc">' + escapeHtml(t('grammar2Desc')) + '</div>';
    html += '<div class="card-grid">';
    let idx2 = 0;
    GRAMMAR2.forEach(function(l){ html += lessonCardHtml(l, idx2++); });
    html += '</div>';
  }

  html += '<div class="section-title"><span class="dot"></span>' + escapeHtml(t('topicsTitle')) + '</div>';
  html += '<div class="section-desc">' + escapeHtml(t('topicsDesc')) + '</div>';
  html += '<div class="card-grid">';
  let idx3 = 0;
  TOPICS.forEach(function(l){ html += lessonCardHtml(l, idx3++); });
  html += '</div>';

  return html;
}

function renderLessonDetail(){
  const lesson = findLesson(state.currentLessonId);
  if(!lesson){ goHome(); return ''; }

  const tabs = getTabsForLesson(lesson);
  let tabsHtml = '';
  if(tabs.length){
    if(!tabs.some(function(tb){ return tb.key === state.activeTab; })) state.activeTab = tabs[0].key;
    tabsHtml = '<div class="tabbar">' + tabs.map(function(tb){
      return '<button class="tab-btn ' + (tb.key === state.activeTab ? 'active' : '') + '" onclick="setTab(\'' + tb.key + '\')">' + escapeHtml(tb.label) + '</button>';
    }).join('') + '</div>';
  }

  let contentHtml = '';
  if(lesson.id === 'alphabet'){
    contentHtml = '<p class="section-desc" style="margin:0 4px 14px;">' + escapeHtml(t('flipHint')) + ' · ' + escapeHtml(t('listenHint')) + '</p>' + renderAlphabetGrid();
  } else if(lesson.id === 'numbers'){
    contentHtml = '<p class="section-desc" style="margin:0 4px 14px;">' + escapeHtml(t('flipHint')) + ' · ' + escapeHtml(t('listenHint')) + '</p>' + renderNumbersGrid();
  } else if(lesson.type === 'grammar'){
    if(state.activeTab === 'quiz') contentHtml = renderQuizEntry(lesson);
    else contentHtml = renderGrammarContent(lesson);
  } else {
    if(state.activeTab === 'words') contentHtml = '<p class="section-desc" style="margin:0 4px 14px;">' + escapeHtml(t('flipHint')) + ' · ' + escapeHtml(t('listenHint')) + '</p>' + renderFlashGrid(lesson.vocab);
    else if(state.activeTab === 'sentences') contentHtml = renderSentenceList(lesson.sentences);
    else if(state.activeTab === 'words2') contentHtml = '<p class="section-desc" style="margin:0 4px 14px;">' + escapeHtml(t('flipHint')) + ' · ' + escapeHtml(t('listenHint')) + '</p>' + renderFlashGrid(lesson.vocab2);
    else if(state.activeTab === 'sentences2') contentHtml = renderSentenceList(lesson.sentences2);
    else if(state.activeTab === 'dialogue') contentHtml = renderDialogue(lesson.dialogue);
    else if(state.activeTab === 'quiz') contentHtml = renderQuizEntry(lesson);
  }

  return (
    '<div class="lesson-header">' +
      '<div class="lh-icon">' + lesson.icon + '</div>' +
      '<div class="lh-text">' +
        '<h2>' + escapeHtml(L(lesson.name)) + '</h2>' +
        '<div class="lh-sub">' + escapeHtml(L(lesson.desc)) + '</div>' +
      '</div>' +
    '</div>' +
    tabsHtml +
    contentHtml
  );
}

  if(state.screen === 'home'){
    brandArea.innerHTML =
      '<span class="brand-logo">🧭</span>' +
      '<div class="brand-text">' +
        '<span class="brand-title es">' + UI[state.lang].appName + '</span>' +
        '<span class="brand-sub">' + escapeHtml(state.level === 2 ? t('level2Badge') : t('level1Badge')) + '</span>' +
      '</div>';
  } else {
    let title = '';
    if(state.screen === 'lesson'){
      const lesson = findLesson(state.currentLessonId);
      title = lesson ? L(lesson.name) : '';
    } else if(state.screen === 'passport'){
      title = t('passportTitle');
    } else if(state.screen === 'settings'){
      title = t('settingsTitle');
    }
    brandArea.innerHTML =
      '<button class="back-btn" onclick="goHome()"><span class="arrow">←</span> ' + escapeHtml(t('backToHome')) + '</button>' +
      '<span class="brand-title" style="font-size:1rem;max-width:50%;color:var(--text);">' + escapeHtml(title) + '</span>';
  }
}

function renderNav(){
  const items = [
    {key:'home', icon:'🏠', label:t('navHome'), action:'goHome()'},
    {key:'passport', icon:'🛂', label:t('navPassport'), action:'goPassport()'},
    {key:'settings', icon:'⚙️', label:t('navMore'), action:'goSettings()'},
  ];
  const html = items.map(function(it){
    const active = (state.screen === it.key) || (it.key === 'home' && state.screen === 'lesson');
    return '<button class="nav-btn ' + (active ? 'active' : '') + '" onclick="' + it.action + '"><span class="nav-icon">' + it.icon + '</span><span>' + escapeHtml(it.label) + '</span></button>';
  }).join('');
  const bottom = document.getElementById('bottom-nav');
  const desktop = document.getElementById('desktop-nav');
  if(bottom) bottom.innerHTML = html;
  if(desktop) desktop.innerHTML = html;
}

/* -------------------------------------------------------------------------
   15. MASTER RENDER + INIT
   ------------------------------------------------------------------------- */
function render(){
  renderHeader();
  renderNav();
  const app = document.getElementById('app');
  let html = '';
  if(state.screen === 'home') html = renderHome();
  else if(state.screen === 'lesson') html = renderLessonDetail();
  else if(state.screen === 'passport') html = renderPassport();
  else if(state.screen === 'settings') html = renderSettings();
  app.innerHTML = html;
}

async function init(){
  await loadPersisted();
  applyLang();
  applyTheme();
  render();
  const themeBtn = document.getElementById('theme-toggle');
  const langBtn = document.getElementById('lang-toggle');
  if(themeBtn) themeBtn.addEventListener('click', function(){ setTheme(state.theme === 'day' ? 'night' : 'day'); });
  if(langBtn) langBtn.addEventListener('click', function(){ setLang(state.lang === 'ar' ? 'en' : 'ar'); });
}

// Expose state for debugging in the browser console
window.state = state;

init();

</script>
</body>
</html>
